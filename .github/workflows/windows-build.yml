name: Windows Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "file_classifier.py"
      - "file_classifier.spec"
      - "requirements*.txt"
      - "tests/**"
      - ".github/workflows/windows-build.yml"

jobs:
  build-windows-exe:
    name: Build Windows exe
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt
          pip install pytest

      - name: Run tests
        shell: pwsh
        run: python -m pytest -q

      - name: Build executable
        shell: pwsh
        run: python -m PyInstaller --clean --noconfirm file_classifier.spec

      - name: Verify executable
        shell: pwsh
        run: |
          if (!(Test-Path "dist/contract-router.exe")) {
            throw "dist/contract-router.exe was not created"
          }
          Get-Item "dist/contract-router.exe" | Format-List FullName,Length,LastWriteTime

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: contract-router-windows-exe
          path: dist/contract-router.exe
          if-no-files-found: error
